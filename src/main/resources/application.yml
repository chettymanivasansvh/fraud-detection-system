server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/fraud_detection_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: C.mani123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    database-platform: org.hibernate.dialect.MySQL5InnoDBDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  jackson:
    serialization:
      fail-on-empty-beans: false

  cache:
    type: caffeine
    cache-names: fraudByTxn
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=10m

logging:
  level:
    org:
      hibernate:
        SQL: DEBUG
      springframework:
        cache: TRACE